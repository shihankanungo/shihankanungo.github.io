title: Shihan Kanungo
author: Shihan Kanungo
url: https://www.shihankanungo.github.io/shihanmoonwalk/ # root address of the site
description: > # description of the site (multiple lines allowed) 
  <img src="images/pic-2.jpeg" alt="Avatar" style="width:250px; border-radius:50%;"> <br />
  Hello there! I’m Shihan&mdash;thanks for stopping by. I live in Palo Alto, CA. I am deeply fascinated by mathematics, physics, language, and music. I play the violin, compose with my MPK Mini Plus, and have a music taste that defies genre (and occasionally logic). When I’m not actively immersed in one of these pursuits, there’s a good chance I’m sitting very still, appearing contemplative&mdash;while secretly daydreaming about my next snack. I aspire to nurture my passions and use them to make meaningful contributions to the world ... ideally with a bit of joy, curiosity, and the occasional pastry along the way.
          <br /><br />

          <small><b>Recent news</b>: <i>AI in Math.</i> A 15-member team from Peking University built a dual-agent AI that autonomously solved Anderson’s conjecture, an open problem in commutative algebra from 2014. The system completed the process in 80 hours, using no human guidance from start to finish.</small>
          <br /><br />
          <small><b>Currently reading</b>: <i>The Name of the Rose</i> by Umberto Eco,  and <i>All Quiet on the Western Front</i> by Erich Maria Remarque.</small>
          <br /><br />
          <small><b>Recent Movies</b>: <i>Before Sunrise</i> (d. Richard Linklater), <i>Before Sunset</i> (d. Richard Linklater), and <i>Pulp Fiction</i> (d. Quentin Tarantino)</small>
          <br /><br />
          <small><b>Current Music Recs</b>: <i>We Stay Ugly 'Til The Pretty Decays</i> by Mara Calder (<a href="https://open.spotify.com/album/2pacOfhvZZHtuYZJnJrwg8?si=9Am8PVTjSkuYAoIyD-RNSQ">Spotify</a>), and <i>Remain In Light</i> by Angelique Kidjo. Also, these playlists, with one song each from my favorite albums from 2025: <a href="https://open.spotify.com/playlist/0b6ipXilq8yItCkbfxZRbl?si=022493cba1c64e71">pop</a> and <a href="https://open.spotify.com/playlist/2iO14usuhKlftJvaT3AK0R?si=7f8887dec02c4fed">jazz</a>. </small>
          <br /><br />
          Song of the day:<br>
          <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/1nlfy9hateke3AfDr3HAAW?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
          <br /><br /><br /><br />
          
